replicaCount: 2

image:
  repository: deadpool-app
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    memory: "64Mi"
    cpu: "100m"
  limits:
    memory: "128Mi"
    cpu: "200m"

livenessProbe:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 5

readinessProbe:
  path: /health
  initialDelaySeconds: 5
  periodSeconds: 3
